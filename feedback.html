<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Отзыв о Volunteer Hub</title><meta name="theme-color" content="#ffffff"><link rel="icon" href="icon.svg" type="image/svg+xml"><style>:root{--brand:#0c5e50;--ink:#102924;--muted:#60746d;--line:#d7e1dc;--bg:#f6faf8;--surface:#fff;--font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 var(--font)}.bar{height:72px;display:flex;align-items:center;justify-content:space-between;max-width:920px;margin:auto;padding:0 24px;border-bottom:1px solid var(--line)}.brand{display:flex;gap:10px;align-items:center;color:var(--ink);font-weight:800;text-decoration:none;letter-spacing:-.03em}.brand img{width:28px;height:28px}.back{color:var(--brand);font-weight:700;text-decoration:none}.wrap{width:min(100% - 40px,620px);margin:74px auto}.eyebrow{margin:0 0 10px;color:var(--brand);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1{max-width:12ch;margin:0;font-size:clamp(32px,5vw,48px);line-height:1.02;letter-spacing:-.05em}header>p{max-width:52ch;margin:18px 0 34px;color:var(--muted);font-size:16px}.form{padding:28px;background:var(--surface);border:1px solid var(--line)}label{display:block;margin:0 0 7px;color:#38534b;font-size:13px;font-weight:750}input,select,textarea{width:100%;margin:0 0 19px;padding:12px;border:1px solid #b7c8c0;background:#fff;color:var(--ink);font:inherit}textarea{min-height:130px;resize:vertical}input:focus,select:focus,textarea:focus{outline:3px solid rgba(12,94,80,.18);border-color:var(--brand)}button{min-height:44px;padding:10px 16px;border:1px solid var(--brand);background:var(--brand);color:#fff;font:700 14px var(--font);cursor:pointer}button:hover{background:#08483f}button:disabled{opacity:.6;cursor:wait}.hint{margin:18px 0 0;color:var(--muted);font-size:13px}.msg{margin:0 0 16px;padding:11px 12px;font-size:14px}.ok{background:#e5f1ec;color:#075447}.err{background:#fff0ed;color:#9b3826}@media(max-width:600px){.bar{height:62px;padding:0 20px}.wrap{width:min(100% - 32px,620px);margin:45px auto}.form{padding:20px}}</style></head>
<body><nav class="bar"><a class="brand" href="index.html"><img src="icon.svg" alt=""><span>Volunteer Hub</span></a><a class="back" href="index.html">На главную</a></nav><main class="wrap"><header><p class="eyebrow">Ваше мнение влияет на продукт</p><h1>Помогите сделать волонтёрство проще.</h1><p>Расскажите, что удобно, что мешает и какой процесс стоит улучшить. На заполнение уйдёт около двух минут.</p></header><form class="form" id="feedbackForm"><label for="fbName">Имя</label><input id="fbName" autocomplete="name" required><label for="fbRole">Роль или организация</label><input id="fbRole" placeholder="сотрудник, координатор, волонтёр"><label for="fbRating">Оценка платформы</label><select id="fbRating" required><option value="5">5 — отлично</option><option value="4">4 — хорошо</option><option value="3">3 — нормально</option><option value="2">2 — неудобно</option><option value="1">1 — не помогает</option></select><label for="fbText">Что добавить или изменить?</label><textarea id="fbText" placeholder="Например: сложно собрать участников, не хватает напоминаний, нужен отчёт по часам…" required></textarea><div id="feedbackMsg"></div><button type="submit">Отправить отзыв</button><p class="hint">Контакт не публикуется. Отзыв используется только для улучшения Volunteer Hub.</p></form></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script>var client=window.supabase.createClient(window.SUPABASE_URL,window.SUPABASE_ANON_KEY);document.getElementById('feedbackForm').addEventListener('submit',async function(e){e.preventDefault();var btn=this.querySelector('button'),msg=document.getElementById('feedbackMsg');btn.disabled=true;msg.innerHTML='';try{var r=await client.from('feedback').insert({name:fbName.value.trim(),role:fbRole.value.trim(),rating:Number(fbRating.value),text:fbText.value.trim()});if(r.error)throw r.error;this.reset();msg.innerHTML='<p class="msg ok">Спасибо! Ваш отзыв сохранён и поможет улучшить платформу.</p>'}catch(err){msg.innerHTML='<p class="msg err">Не удалось отправить отзыв. Проверьте соединение и попробуйте ещё раз.</p>'}finally{btn.disabled=false}});</script></body></html>
